<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>LRS Overlay</title>
</head>
<body>
  <div id="app">
    <header id="appHeader">
      <button id="backButton" type="button">← Назад</button>
      <button id="themeToggle" type="button">🌙</button>
    </header>
    <main id="appView"></main>
    <div id="termModal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" id="termModalBackdrop"></div>
      <div class="modal-content">
        <button class="modal-close" id="termModalClose">×</button>
        <h2 id="termModalTitle"></h2>
        <p id="termModalBody"></p>
        <div class="modal-controls">
          <button type="button" id="fontDown">A−</button>
          <button type="button" id="fontUp">A+</button>
        </div>
      </div>
    </div>
  </div>
  <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
  <!-- здесь подключается scripts.js для старого манифеста -->
  <script src="scripts.js"></script>
</body>
</html>
