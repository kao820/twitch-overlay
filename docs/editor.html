<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LRS Overlay — Админка</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <header class="admin-header">
    <h1 class="admin-title">Админка LRS Overlay</h1>
    <button id="themeToggle" class="theme-toggle" title="Переключить тему">🌙</button>
  </header>
  <nav class="tabs">
    <button class="tab active" data-tab="heroes" type="button">Герои</button>
    <button class="tab" data-tab="glossary" type="button">Словарь</button>
  </nav>
  <main class="tab-wrapper">
    <section id="tabHeroes" class="tab-content">
      <div class="heroes-list" id="heroesList"></div>
      <div class="heroes-controls">
        <button id="addHero" type="button">Новый герой</button>
        <button id="downloadHeroes" type="button">Скачать heroes.json</button>
      </div>
      <div id="heroForm" class="hero-form hidden" aria-hidden="true">
        <div class="hero-form-card">
          <div class="hero-form-header">
            <h2 id="heroFormTitle">Редактировать героя</h2>
            <button id="closeHeroForm" class="close-btn" type="button" aria-label="Закрыть">✕</button>
          </div>
          <div class="hero-form-body">
            <!-- поля формы для героя... -->
          </div>
          <div class="hero-form-footer">
            <button id="applyHero" type="button" class="apply-btn">Применить</button>
          </div>
        </div>
      </div>
    </section>
    <section id="tabGlossary" class="tab-content hidden">
      <div class="glossary-layout">
        <div class="glossary-left">
          <div class="glossary-letters" id="glossaryLetters"></div>
          <div class="glossary-terms" id="glossaryList"></div>
        </div>
        <div class="glossary-right">
          <label>Термин<input type="text" id="glossTerm" autocomplete="off"></label>
          <label>Описание<textarea id="glossDesc" rows="6"></textarea></label>
          <div class="glossary-actions">
            <button id="addTermBtn" type="button">Добавить термин</button>
            <button id="saveTermBtn" type="button" class="hidden">Сохранить</button>
            <button id="cancelTermBtn" type="button" class="hidden">Отмена</button>
            <button id="downloadGlossary" type="button">Скачать glossary.json</button>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
  <script src="editor.js"></script>
</body>
</html>
