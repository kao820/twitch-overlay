<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RPG Overlay — Editor</title>
  <!-- Custom admin styles with light/dark theme and improved layout -->
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <!-- Header with title and theme toggle button -->
  <header class="header">
    <h2>RPG Overlay — Админка</h2>
    <button id="themeToggle" class="theme-toggle" title="Переключить тему">🌙</button>
  </header>

  <!-- Tab navigation -->
  <div class="tabs">
    <div class="tab active" data-tab="heroes">Герои</div>
    <div class="tab" data-tab="glossary">Словарь</div>
  </div>

  <!-- Heroes tab -->
  <div id="tabHeroes">
    <!-- Container for hero cards (grid layout defined in CSS) -->
    <div class="chars-list" id="charsContainer"></div>
    <div class="controls">
      <button id="downloadHeroes">Скачать heroes.json</button>
      <!-- Кнопка для добавления нового героя -->
      <button id="addHero">Добавить</button>
      <!-- Кнопка для очистки всех полей -->
      <button id="loadSampleHeroes" title="Очистить все поля">Очистить</button>
    </div>
    <div class="small">Портреты указывай по URL или через папку assets (assets/имя.png)</div>
  </div>

  <!-- Glossary tab -->
  <div id="tabGlossary" style="display:none">
    <div class="glossary-container">
      <!-- Left column: alphabet selector and list of terms -->
      <div class="glossary-left">
        <label>Буква</label>
        <select id="glossLetter"></select>
        <div id="glossList"></div>
      </div>
      <!-- Right column: form for adding/editing glossary terms -->
      <div class="glossary-right">
        <label>Новый термин</label>
        <input id="newTerm" placeholder="Термин">
        <label>Описание</label>
        <textarea id="newDesc" rows="3"></textarea>
        <div class="controls">
          <button id="addTerm">Добавить</button>
          <button id="downloadGloss">Скачать glossary.json</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Load the Twitch Extension helper BEFORE any of your own scripts -->
  <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
  <script src="editor.js"></script>
</body>
</html>
